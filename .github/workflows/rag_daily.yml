name: RAG SUNASS Daily Batch

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM Perú (UTC-5)
  workflow_dispatch:

jobs:
  run-rag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Poppler + Tesseract)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-spa

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install faiss-cpu

      # 🔹 Descargar PDFs desde Google Drive
      - name: Download PDFs from Drive
        run: python drive_downloader.py
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}

      # 🔹 Ejecutar RAG
      - name: Run RAG batch
        run: python main.py --input ./pdfs --output ./resultados

      # 🔹 Subir JSON generados a Drive
      - name: Upload JSON to Drive
        run: python drive_uploader.py
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          DRIVE_RESULTS_FOLDER_ID: ${{ secrets.DRIVE_RESULTS_FOLDER_ID }}

      # 🔹 Guardar resultados como artifact (opcional)
      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resultados-json
          path: resultados/